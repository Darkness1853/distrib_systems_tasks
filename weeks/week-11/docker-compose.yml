version: '3.9'

services:
  tasks-svc-s17:
    build: ./app
    ports:
      - "8196:8196"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8196/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app-network
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
    networks:
      - app-network

  gateway:
    build: ./gateway
    ports:
      - "8080:80"
    depends_on:
      - tasks-svc-s17
    networks:
      - app-network

networks:
  app-network:
    driver: bridge