syntax = "proto3";

// Опишите ваш пакет и сервис здесь
package products.v1;

service ProductsService {
    rpc CreateProduct (CreateProductRequest) returns (Product);
}

message CreateProductRequest {
    string id = 1;
    float price = 2;
 }

message Product {
    string id = 1;
    float price = 2;
}