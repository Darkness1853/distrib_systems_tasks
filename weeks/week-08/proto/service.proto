syntax = "proto3";

package orders.v1;

service OrdersService {
    rpc CreateOrder (CreateOrderRequest) returns (Order);
    rpc SubscribeOrders (SubscribeOrdersRequest) returns (stream Order);
}

message CreateOrderRequest {
    string id = 1;
    int32 priority = 2;
}

message SubscribeOrdersRequest {
    int32 limit = 1;
}

message Order {
    string id = 1;
    int32 priority = 2;
}